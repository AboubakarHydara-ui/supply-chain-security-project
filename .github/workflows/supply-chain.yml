# Pipeline supply-chain de référence (Lab 5).
# build → SBOM → scan → push → sign (keyless) → attest (SBOM + provenance).
# Signature KEYLESS : aucune clé stockée, l'identité est celle de CE workflow (OIDC).
name: supply-chain

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write        # pousser sur GHCR
  id-token: write        # OIDC → signature keyless (Fulcio/Rekor)

env:
  # Les références Docker doivent rester en minuscules.
  IMAGE: ghcr.io/aboubakarhydara-ui/scs-demo-app-ci

jobs:
  build-sign-attest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image (récupère le digest)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          tags: ${{ env.IMAGE }}:${{ github.sha }}

      - name: Référence par digest
        id: ref
        run: echo "ref=${{ env.IMAGE }}@${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"

      # ---- SBOM ----
      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Generate SBOM (CycloneDX)
        run: syft "${{ steps.ref.outputs.ref }}" -o cyclonedx-json > sbom.cdx.json

      # ---- Scan : casse si CRITICAL corrigeable ----
      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Scan (Grype) — gate sur CRITICAL
        run: grype "${{ steps.ref.outputs.ref }}" --only-fixed --fail-on critical

      # ---- Signature keyless ----
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.2.4
      - name: Sign image (keyless)
        env:
          COSIGN_DOCKER_MEDIA_TYPES: "1"
        run: cosign sign --yes "${{ steps.ref.outputs.ref }}"

      # ---- Attestation SBOM ----
      - name: Attest SBOM
        env:
          COSIGN_DOCKER_MEDIA_TYPES: "1"
        run: |
          cosign attest --yes \
            --predicate sbom.cdx.json \
            --type cyclonedx \
            "${{ steps.ref.outputs.ref }}"

      # ---- Attestation de provenance SLSA ----
      - name: Génère la provenance
        run: |
          cat > provenance.json <<EOF
          {
            "buildType": "https://github.com/actions/runner/v1",
            "builder": { "id": "${{ github.server_url }}/${{ github.repository }}/.github/workflows/supply-chain.yml@${{ github.ref }}" },
            "invocation": {
              "configSource": {
                "uri": "git+${{ github.server_url }}/${{ github.repository }}",
                "digest": { "sha1": "${{ github.sha }}" }
              }
            }
          }
          EOF
      - name: Attest provenance (SLSA)
        env:
          COSIGN_DOCKER_MEDIA_TYPES: "1"
        run: |
          cosign attest --yes \
            --predicate provenance.json \
            --type slsaprovenance \
            "${{ steps.ref.outputs.ref }}"

      - name: Verify keyless signature
        env:
          COSIGN_DOCKER_MEDIA_TYPES: "1"
        run: |
          cosign verify \
            --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/supply-chain.yml@refs/heads/main" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${{ steps.ref.outputs.ref }}"

      - name: Récapitulatif
        run: |
          echo "### Image signée & attestée :computer:" >> "$GITHUB_STEP_SUMMARY"
          echo "\`${{ steps.ref.outputs.ref }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Identité keyless attendue :" >> "$GITHUB_STEP_SUMMARY"
          echo "\`https://github.com/${{ github.repository }}/.github/workflows/supply-chain.yml@refs/heads/main\`" >> "$GITHUB_STEP_SUMMARY"

# NB : pour une provenance SLSA "officielle" (niveau supérieur), voir le générateur
#      slsa-framework/slsa-github-generator (job séparé). Le bloc ci-dessus est volontairement
#      simple à des fins pédagogiques.
